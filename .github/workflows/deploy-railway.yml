name: Deploy to Railway

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Railway
        uses: railwayapp/deploy@v3
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          railway_service: ${{ secrets.RAILWAY_SERVICE_ID }}
